# Render Blueprint — PBL Portal Backend
# Deploy: Render Dashboard → New → Blueprint → connect GitHub repo

databases:
  - name: pbl-portal-db
    plan: free
    databaseName: pbl_portal
    user: pbl_user

services:
  - type: web
    name: pbl-portal-api
    plan: free
    runtime: node
    rootDir: server
    buildCommand: npm install && npx prisma generate && npx prisma db push && node seed.js && node seed_supervisor_mock.js
    startCommand: node index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pbl-portal-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: TEACHER_INVITE_CODE
        value: teacher123
      - key: FRONTEND_URL
        value: https://your-app.vercel.app
      - key: NODE_ENV
        value: production
